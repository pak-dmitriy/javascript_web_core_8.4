<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">


</head>

<body>
    <section class="brands">
        <h2 class="brands__title">РЕМОНТ ТЕХНИКИ РАЗЛИЧНЫХ БРЕНДОВ</h2>

        <div class="brands__container swiper">

            <div class="brands__list swiper-wrapper">
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap.svg" alt="Lenovo" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (1).svg" alt="Samsung" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (2).svg" alt="Apple" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (3).svg" alt="ViewSonic" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (4).svg" alt="Bosch" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (5).svg" alt="HP" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (6).svg" alt="Acer" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (7).svg" alt="Sony" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (1).svg" alt="Lenovo" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (1).svg" alt="Samsung" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>

                </div>
                <div class="brands__item swiper-slide">
                    <img src="img/Bitmap (2).svg" alt="Apple" class="brands__logo"><button class="brands__btn"><img
                            src="img/go.svg" alt=""></button>



                </div>
                <div class="brands__item swiper-slide ghost-slide"></div>
            </div>
            <div class="swiper-pagination"></div>

        </div>

        <button class="brands__expand-button"><img src="img/expand.svg" alt="">Показать все</button>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <script src="script.js"></script>
</body>

</html>
